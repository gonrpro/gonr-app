name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Env contract
        run: node scripts/check-env.mjs ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          LEMONSQUEEZY_WEBHOOK_SECRET: test-webhook-secret
          OPENAI_API_KEY: test-openai-key

      - name: Protocol schema gate
        run: npm run schema:gate:strict

      - name: Typecheck
        run: npm run typecheck
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          LEMONSQUEEZY_WEBHOOK_SECRET: test-webhook-secret
          OPENAI_API_KEY: test-openai-key

      - name: Lint changed files
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' | tr '\n' ' ')
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed JS/TS files to lint."
            exit 0
          fi
          npx eslint $CHANGED_FILES

      - name: Tests
        run: npm test
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          LEMONSQUEEZY_WEBHOOK_SECRET: test-webhook-secret
          OPENAI_API_KEY: test-openai-key

      - name: Auth smoke tests
        run: npm run test:auth-smoke
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          LEMONSQUEEZY_WEBHOOK_SECRET: test-webhook-secret
          OPENAI_API_KEY: test-openai-key

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          LEMONSQUEEZY_WEBHOOK_SECRET: test-webhook-secret
          OPENAI_API_KEY: test-openai-key
